<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A Little Bloom — Daily Wellness Tips · Criste Joy Calosor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,500;1,700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/demo.css" />
  <style>
    .frame { max-width: 720px; padding-top: 48px; }
    .header { text-align: center; margin-bottom: 32px; }
    .header h1 {
      font-size: 44px;
      margin: 4px 0 8px;
      color: var(--rose-700);
    }
    .header .sub {
      font-size: 14px;
      color: var(--rose-500);
      font-style: italic;
    }

    .card {
      background: white;
      border-radius: 24px;
      padding: 40px 36px;
      box-shadow: 0 8px 40px rgba(244, 63, 94, 0.10);
      border: 1px solid var(--rose-100);
      position: relative;
      overflow: hidden;
      min-height: 320px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, var(--blush-100), transparent 70%);
      pointer-events: none;
    }
    .card-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .tip-num {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      color: var(--amber-500);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }
    .tip-icon {
      font-size: 48px;
      line-height: 1;
    }
    .tip-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 30px;
      color: var(--rose-700);
      margin: 0;
      line-height: 1.2;
    }
    .tip-body {
      font-size: 16px;
      line-height: 1.7;
      color: var(--rose-600);
      margin: 0;
    }
    .tip-tag {
      align-self: flex-start;
      background: var(--blush-50);
      color: var(--rose-500);
      border: 1px solid var(--rose-100);
      border-radius: 999px;
      padding: 5px 14px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      gap: 12px;
      margin-top: 28px;
      justify-content: space-between;
      align-items: center;
    }
    .btn {
      background: linear-gradient(135deg, var(--rose-500), var(--rose-400));
      color: white;
      border: none;
      border-radius: 999px;
      padding: 12px 28px;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(244, 63, 94, 0.28);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 24px rgba(244, 63, 94, 0.35); }
    .btn.ghost {
      background: white;
      color: var(--rose-500);
      border: 2px solid var(--rose-200);
      box-shadow: none;
    }
    .btn.ghost:hover { border-color: var(--rose-400); color: var(--rose-700); transform: none; }

    .progress {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 24px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--rose-200);
      transition: background 0.2s ease;
    }
    .dot.active { background: var(--rose-500); }

    .demo-tag {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(6px);
      border: 1px solid var(--rose-200);
      color: var(--rose-500);
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 999px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="frame">
    <a href="../../" class="back-link">← Back to portfolio</a>

    <div class="header">
      <p class="eyebrow">✦ Daily Wellness ✦</p>
      <h1>A Little Bloom</h1>
      <p class="sub">One small thing to feel a little better today.</p>
    </div>

    <div class="card">
      <div class="card-inner">
        <span class="tip-tag" id="tip-tag">Mind</span>
        <div class="tip-num" id="tip-num">Tip 01 of 08</div>
        <div class="tip-icon" id="tip-icon">🌿</div>
        <h2 class="tip-title" id="tip-title">Loading…</h2>
        <p class="tip-body" id="tip-body"></p>
      </div>

      <div class="controls">
        <button class="btn ghost" id="prev">← Previous</button>
        <button class="btn" id="next">Next tip →</button>
      </div>
      <div class="progress" id="progress"></div>
    </div>
  </div>

  <span class="demo-tag">Wellness micro-site · Portfolio demo</span>

  <script>
    const tips = [
      { tag: 'Mind',     icon: '🌿', title: 'Two minutes of nothing.',
        body: 'Set a timer for 120 seconds. Sit. Don\'t scroll, don\'t plan, don\'t fix anything. Just notice the air. The smallest pauses are the ones your nervous system remembers.' },
      { tag: 'Body',     icon: '💧', title: 'Drink a glass before coffee.',
        body: 'You wake up dehydrated. A full glass of water before your first coffee gives your body a head start — and often takes the edge off that mid-morning slump.' },
      { tag: 'Movement', icon: '🚶', title: 'Walk for ten, no phone.',
        body: 'A short walk without your phone is a different walk. Try it once today — around the block, around the office, around your house. Notice how your shoulders move.' },
      { tag: 'Sleep',    icon: '🌙', title: 'Dim the lights at sundown.',
        body: 'An hour before bed, switch your overhead lights for a single warm lamp. Bright light tells your brain it\'s noon — softer light tells it the day is winding down.' },
      { tag: 'Mind',     icon: '✍️', title: 'Write three lines.',
        body: 'Before bed, write three lines: one thing you noticed, one thing that helped, one thing you want to carry into tomorrow. That\'s the whole journal.' },
      { tag: 'Body',     icon: '🌞', title: 'Five minutes of morning light.',
        body: 'Sunlight in the first hour after waking helps anchor your sleep cycle. Step outside with your coffee — even on cloudy days, it counts.' },
      { tag: 'Movement', icon: '🤸', title: 'Stretch where you stand.',
        body: 'Right now: roll your shoulders back three times. Reach overhead. Open your chest. Done. That\'s the bar — anything more is a bonus.' },
      { tag: 'Mind',     icon: '📞', title: 'Send the small text.',
        body: 'The friend you keep meaning to message — send the two-line text. Not the long catch-up. Just "thinking of you." Connection compounds.' },
    ];

    let idx = 0;

    const tagEl   = document.getElementById('tip-tag');
    const numEl   = document.getElementById('tip-num');
    const iconEl  = document.getElementById('tip-icon');
    const titleEl = document.getElementById('tip-title');
    const bodyEl  = document.getElementById('tip-body');
    const progress = document.getElementById('progress');

    tips.forEach((_, i) => {
      const dot = document.createElement('span');
      dot.className = 'dot' + (i === 0 ? ' active' : '');
      progress.appendChild(dot);
    });
    const dots = progress.children;

    function render() {
      const t = tips[idx];
      tagEl.textContent = t.tag;
      numEl.textContent = `Tip ${String(idx + 1).padStart(2, '0')} of ${String(tips.length).padStart(2, '0')}`;
      iconEl.textContent = t.icon;
      titleEl.textContent = t.title;
      bodyEl.textContent = t.body;
      Array.from(dots).forEach((d, i) => d.classList.toggle('active', i === idx));
    }

    document.getElementById('next').addEventListener('click', () => {
      idx = (idx + 1) % tips.length;
      render();
    });
    document.getElementById('prev').addEventListener('click', () => {
      idx = (idx - 1 + tips.length) % tips.length;
      render();
    });

    render();
  </script>
</body>
</html>
